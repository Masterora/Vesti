services:
  postgres:
    image: postgres:16
    container_name: vesti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vesti
    ports:
      - "5432:5432"
    volumes:
      - vesti-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vesti"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vesti-postgres-data:
